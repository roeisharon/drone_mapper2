# configs/mission_configs/benchmark_explore.yaml
# Exploration mission for the benchmark map. The step budget is bounded so a run stays well under a
# minute; raise it for fuller coverage if your machine has the headroom (staff target: < 1 minute).
# boundaries cover the map's full world extent (report + validation metadata; Option A).

mission_config:
  max_steps: 30000
  boundaries:
    x_boundary:
      min_cm: -10
      max_cm: 19
    y_boundary:
      min_cm: -10
      max_cm: 20
    height_boundary:
      min_cm: -10
      max_cm: 21
  gps_resolution_cm: 1
  output_mapping_resolution_factor: 1
