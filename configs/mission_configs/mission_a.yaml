# mission_configs/mission_a.yaml
# Standard exploration mission: 500 steps, 10 cm GPS resolution (== map resolution,
# so the output map is the same 5×5×5 grid as the hidden map).
#
# `boundaries` is the spec's region-to-map block. It now bounds where the drone actually maps:
# the output map is narrowed to (map extent ∩ these bounds). Values match this map's world range
# after the offset in sim_a.yaml — [-20, 30) cm per axis — so the drone maps the full map.

mission_config:
  max_steps: 5000
  boundaries:
    x_boundary:
      min_cm: 0
      max_cm: 3
    y_boundary:
      min_cm: 0
      max_cm: 3
    height_boundary:
      min_cm: 0
      max_cm: 3
  gps_resolution_cm: 1
  output_mapping_resolution_factor: 1
