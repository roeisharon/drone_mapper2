# simulation_compositions.yaml
# Rich multi-run composition. The cartesian product is:
#   (per simulation: its mission_configs) x [drone_configs] x [lidar_configs]
#   = (2 missions [pillars] + 1 mission [benchmark]) x 2 drones x 2 lidars = 12 single-simulation runs.
#
# Two environments, each loaded as a hidden ground-truth .npy map:
#   - pillars   : a synthetic sealed 9x9x4 room with two interior pillars (fast).
#   - benchmark : the course-staff (29,30,31) house-over-earth map (larger; ~ up to a minute per run).
# The two drones differ in body size and movement limits; the two lidars in beam count and range, so
# the same map yields different paths, coverage, and scores. All sub-config paths resolve relative to
# this file's directory.
#
# Run with:
#   ./drone_mapper_simulation configs/simulation_compositions.yaml <output_path>
# For a fast single-run check, use configs/smoke_composition.yaml instead.

simulation_compositions:
  simulations:
    - simulation_config: sim_configs/benchmark.yaml
      mission_configs:
        - mission_configs/benchmark_explore.yaml

  drone_configs:
    - drone_configs/drone_small.yaml
    - drone_configs/drone_large.yaml

  lidar_configs:
    - lidar_configs/lidar_a.yaml
    - lidar_configs/lidar_b.yaml
