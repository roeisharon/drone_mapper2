# smoke_composition.yaml
# Minimal single-run composition (1 simulation x 1 mission x 1 drone x 1 lidar = 1 run) over the
# tiny single-voxel map. Use this for a fast end-to-end sanity check.
#
# Run with:
#   ./drone_mapper_simulation configs/smoke_composition.yaml <output_path>

simulation_compositions:
  simulations:
    - simulation_config: sim_configs/sim_a.yaml
      mission_configs:
        - mission_configs/mission_a.yaml

  drone_configs:
    - drone_configs/drone_small.yaml
    - drone_configs/drone_large.yaml

  lidar_configs:
    - lidar_configs/lidar_a.yaml
    - lidar_configs/lidar_b.yaml
