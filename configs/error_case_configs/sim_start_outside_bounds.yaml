# error_case_configs/sim_start_outside_bounds.yaml
# Start position inside the map but outside the mission bounds. The map spans world [0,50); the start
# is at (35,35,35) — an air cell (index 3) in the map, but outside the [0,10) mission bounds set by
# mission_small_bounds.yaml.
# Expected: scored -1 with code START_OUTSIDE_MISSION_BOUNDS (the bounds check precedes the obstacle
# check, and (35,35,35) is air anyway).

simulation_config:
  map_filename: ../../data_maps/single_voxel_x4_y4_z4.npy
  map_resolution_cm: 10
  initial_drone_position:
    x_cm: 35
    y_cm: 35
    height_cm: 35
  initial_angle_deg: 0
