# error_case_configs/sim_start_outside_map.yaml
# Start position far outside the loaded map's extent. The 5x5x5 @ 10cm map (offset 0) spans world
# [0,50); the start at (1000,1000,1000) is well outside it.
# Expected: SimulationRunImpl validates the start, scores the scenario -1 with code START_OUTSIDE_MAP.

simulation_config:
  map_filename: ../../data_maps/single_voxel_x4_y4_z4.npy
  map_resolution_cm: 10
  initial_drone_position:
    x_cm: 1000
    y_cm: 1000
    height_cm: 1000
  initial_angle_deg: 0
