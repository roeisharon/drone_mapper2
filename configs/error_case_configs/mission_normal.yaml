# error_case_configs/mission_normal.yaml
# A valid mission whose bounds cover the full 50cm map. Runs normally (real score) on a good map.

mission_config:
  max_steps: 200
  boundaries:
    x_boundary:
      min_cm: 0
      max_cm: 50
    y_boundary:
      min_cm: 0
      max_cm: 50
    height_boundary:
      min_cm: 0
      max_cm: 50
  gps_resolution_cm: 10
  output_mapping_resolution_factor: 1
