# error_case_configs/mission_small_bounds.yaml
# Mission restricted to the world box [0,10) on every axis — a small sub-region of the 50cm map.
# Used with sim_start_outside_bounds.yaml (start at (35,35,35)) to trigger START_OUTSIDE_MISSION_BOUNDS.

mission_config:
  max_steps: 50
  boundaries:
    x_boundary:
      min_cm: 0
      max_cm: 10
    y_boundary:
      min_cm: 0
      max_cm: 10
    height_boundary:
      min_cm: 0
      max_cm: 10
  gps_resolution_cm: 10
  output_mapping_resolution_factor: 1
