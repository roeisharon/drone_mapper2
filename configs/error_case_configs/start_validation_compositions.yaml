# error_case_configs/start_validation_compositions.yaml
# Exercises Stage 2 start-position validation. Each of the first three groups has an unrunnable start
# and must score -1 with a specific code; the fourth is valid and must still run (failures are
# isolated per scenario). Sub-config paths resolve relative to this file's directory.
#
# Run with:
#   ./drone_mapper_simulation configs/error_case_configs/start_validation_compositions.yaml ./out_start
#
# Expected (1 drone x 1 lidar → 1 run per group, 4 runs total):
#   sim_start_outside_map     → score -1, error_ref.code = START_OUTSIDE_MAP
#   sim_start_in_obstacle     → score -1, error_ref.code = START_IN_OBSTACLE
#   sim_start_outside_bounds  → score -1, error_ref.code = START_OUTSIDE_MISSION_BOUNDS
#   sim_good                  → a real score (NOT -1) — other scenarios continue normally

simulation_compositions:
  simulations:
    - simulation_config: sim_start_outside_map.yaml
      mission_configs:
        - mission_normal.yaml
    - simulation_config: sim_start_in_obstacle.yaml
      mission_configs:
        - mission_normal.yaml
    - simulation_config: sim_start_outside_bounds.yaml
      mission_configs:
        - mission_small_bounds.yaml
    - simulation_config: sim_good.yaml
      mission_configs:
        - mission_normal.yaml

  drone_configs:
    - ../drone_configs/drone_small.yaml
    - ../drone_configs/drone_large.yaml

  lidar_configs:
    - ../lidar_configs/lidar_a.yaml
    - ../lidar_configs/lidar_b.yaml
