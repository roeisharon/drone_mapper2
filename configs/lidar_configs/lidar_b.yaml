# configs/lidar_configs/lidar_b.yaml
# A sparser, shorter-range lidar than lidar_a: fewer beam circles (1 + 4 = 5 beams) and a tighter
# z_max. Coverage is lower, so runs using it may leave more cells unmapped → lower scores (variety).
#   z_min_cm: minimum detection range
#   z_max_cm: maximum beam range
#   d_cm:     spacing between beam circles at z_min
#   fov_circles: number of beam circles (0..fov_circles-1)

lidar_config:
  z_min_cm: 1
  z_max_cm: 10
  d_cm: 2
  fov_circles: 3
