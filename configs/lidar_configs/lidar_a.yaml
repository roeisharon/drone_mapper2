# lidar_configs/lidar_a.yaml
# Mid-range lidar tuned for the small 50 cm test map.
#   z_min_cm: minimum detection range (positive)
#   z_max_cm: maximum beam range
#   d_cm:     spacing between beam circles at z_min
#   fov_circles: number of beam circles (0..fov_circles-1) → 1 + 4 + 8 = 13 beams

lidar_config:
  z_min_cm: 1
  z_max_cm: 10
  d_cm: 1
  fov_circles: 3
